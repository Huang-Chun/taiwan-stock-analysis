<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股分析</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg:       #0d1117;
      --bg2:      #161b22;
      --bg3:      #21262d;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --blue:     #58a6ff;
      --green:    #3fb950;
      --red:      #f85149;
      --yellow:   #e3b341;
      --purple:   #bc8cff;
      --orange:   #f0a070;
      --radius:   10px;
    }

    body { font-family:'Microsoft JhengHei',Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* ── Topbar ── */
    .topbar {
      display:flex; align-items:center; gap:12px;
      padding:10px 20px; background:var(--bg2);
      border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100;
    }
    .topbar a { color:var(--muted); text-decoration:none; font-size:13px; white-space:nowrap; }
    .topbar a:hover { color:var(--blue); }
    .search-wrap { display:flex; gap:8px; margin-left:auto; }
    #stockInput {
      background:var(--bg); border:1px solid var(--border);
      color:var(--text); padding:6px 12px; border-radius:6px;
      font-size:14px; width:130px; outline:none;
    }
    #stockInput:focus { border-color:var(--blue); }
    .btn {
      padding:6px 14px; border-radius:6px; border:1px solid var(--border);
      background:var(--bg3); color:var(--text); cursor:pointer;
      font-size:13px; transition:background .15s; white-space:nowrap;
    }
    .btn:hover { background:var(--border); }
    .btn.active { background:#1f6feb; border-color:#1f6feb; color:#fff; }
    #syncStatus { padding:5px 20px; font-size:12px; background:var(--bg2); border-bottom:1px solid var(--border); display:none; }

    /* ── Stock Header ── */
    .stock-header {
      padding:14px 20px 12px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:12px;
    }
    .header-left { display:flex; flex-direction:column; gap:5px; }
    .header-title { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
    #stockName { font-size:22px; font-weight:700; }
    #stockCode { font-size:14px; color:var(--muted); }
    .tags { display:flex; gap:6px; flex-wrap:wrap; }
    .tag {
      font-size:11px; padding:2px 8px; border-radius:4px;
      background:var(--bg3); border:1px solid var(--border); color:var(--muted);
    }
    .price-row { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
    #closePrice { font-size:30px; font-weight:700; }
    #changeBadge { font-size:14px; font-weight:600; padding:3px 10px; border-radius:6px; }
    #ohlcRow { font-size:13px; color:var(--muted); }

    .header-right { display:flex; gap:12px; align-items:center; }
    .score-group { display:flex; gap:8px; }
    .score-badge {
      display:flex; flex-direction:column; align-items:center;
      background:var(--bg3); border:1px solid var(--border);
      border-radius:var(--radius); padding:7px 12px; min-width:64px;
    }
    .score-badge .score-val { font-size:20px; font-weight:700; }
    .score-badge .score-lbl { font-size:10px; color:var(--muted); margin-top:2px; }

    .up   { color:var(--red); }
    .down { color:var(--green); }
    .flat { color:var(--muted); }
    .up-bg   { background:rgba(248,81,73,.15); color:var(--red); }
    .down-bg { background:rgba(63,185,80,.15); color:var(--green); }
    .flat-bg { background:var(--bg3); color:var(--muted); }

    /* ── Tab Nav ── */
    .tab-nav {
      display:flex; gap:4px; align-items:center;
      padding:10px 20px; background:var(--bg2);
      border-bottom:1px solid var(--border);
    }
    .tab-btn {
      padding:6px 20px; border-radius:6px; border:1px solid var(--border);
      background:transparent; color:var(--muted); cursor:pointer;
      font-size:13px; font-weight:500; transition:all .15s; white-space:nowrap;
      font-family:inherit;
    }
    .tab-btn:hover:not(.active) { background:var(--bg3); color:var(--text); }
    .tab-btn.active { background:#1f6feb; border-color:#1f6feb; color:#fff; }
    .tab-divider { width:1px; height:18px; background:var(--border); margin:0 6px; }

    /* ── Chart Controls ── */
    .chart-controls {
      display:flex; align-items:center; gap:16px; flex-wrap:wrap;
      padding:10px 20px; border-bottom:1px solid var(--border); background:var(--bg2);
    }
    .period-bar { display:flex; gap:5px; }
    .legend-bar { display:flex; gap:14px; font-size:12px; color:var(--muted); flex-wrap:wrap; }
    .ldot { display:inline-block; width:20px; height:3px; border-radius:2px; margin-right:4px; vertical-align:middle; }

    /* ── Page body (charts + sidebar) ── */
    .page-body { display:flex; align-items:flex-start; background:var(--bg); }
    .charts-col { flex:1; min-width:0; }

    /* ── Sidebar ── */
    .sidebar {
      width:900px; flex-shrink:0;
      border-left:1px solid var(--border);
      position:sticky; top:47px;
      max-height:calc(100vh - 47px);
      overflow-y:auto;
    }
    .sb-section { padding:12px 14px; border-bottom:1px solid var(--border); }
    .sb-title {
      font-size:10px; font-weight:700; color:var(--muted);
      text-transform:uppercase; letter-spacing:.07em; margin-bottom:10px;
    }
    .sb-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
    .sb-label { font-size:12px; color:var(--muted); }
    .sb-val   { font-size:14px; font-weight:700; }
    .sb-bar   { height:3px; border-radius:2px; background:var(--bg3); margin:3px 0 8px; overflow:hidden; }
    .sb-bar-fill { height:100%; border-radius:2px; }
    .sb-sig-list { display:flex; flex-direction:column; gap:5px; }
    .sb-ai { font-size:12px; color:var(--text); line-height:1.65; overflow-y:auto; max-height:420px; }
    .sb-ai p { margin:0 0 6px; }
    .sb-ai strong, .sb-ai b { color:var(--yellow); }
    .sb-ai ul, .sb-ai ol { padding-left:16px; margin:0 0 6px; }
    .sb-ai li { margin-bottom:3px; }
    .sb-ai h1,.sb-ai h2,.sb-ai h3 { font-size:12px; font-weight:700; color:var(--blue); margin:8px 0 4px; }
    .sb-ai code { background:var(--bg3); padding:1px 4px; border-radius:3px; font-size:11px; }

    /* ── Charts ── */
    .kline-wrap { position:relative; }
    .cross-toggle-btn {
      position:absolute; top:8px; right:8px; z-index:10;
      padding:3px 9px; font-size:11px; font-family:inherit;
      border-radius:4px; border:1px solid var(--border);
      background:var(--bg2); color:var(--muted); cursor:pointer;
      transition:all .15s;
    }
    .cross-toggle-btn:hover:not(.active) { background:var(--bg3); color:var(--text); }
    .cross-toggle-btn.active { background:rgba(63,185,80,.15); border-color:#3fb950; color:#3fb950; }
    #klineChart  { width:100%; height:420px; }
    #volumeChart { width:100%; height:90px; }
    #rsiChart    { width:100%; height:130px; }
    #kdChart     { width:100%; height:138px; }
    #macdChart   { width:100%; height:138px; }
    @media(max-width:800px){
      .page-body  { flex-direction:column; }
      .sidebar    { width:100%; position:static; max-height:none; border-left:none; border-top:1px solid var(--border); }
    }

    /* ── Section ── */
    .section { padding:20px 20px 0; }
    .section-title {
      font-size:15px; font-weight:600; color:var(--text);
      margin-bottom:14px; padding-bottom:10px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:8px;
    }
    .section-title::before {
      content:''; display:inline-block;
      width:3px; height:16px; background:var(--blue); border-radius:2px;
    }

    /* ── Indicator Cards ── */
    .cards-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap:10px; margin-bottom:20px;
    }
    .icard {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--radius); padding:12px 14px;
    }
    .icard-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
    .icard-value { font-size:20px; font-weight:700; }
    .icard-sub   { font-size:11px; color:var(--muted); margin-top:4px; }
    .icard-bar   { height:4px; border-radius:2px; background:var(--bg3); margin-top:8px; overflow:hidden; }
    .icard-bar-fill { height:100%; border-radius:2px; transition:width .4s; }

    /* ── Signal Tags ── */
    .signals-wrap { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; min-height:32px; }
    .signal-tag {
      font-size:12px; padding:4px 10px; border-radius:20px;
      border:1px solid; font-weight:500;
    }
    .signal-tag.bull { background:rgba(63,185,80,.12); border-color:rgba(63,185,80,.4); color:var(--green); }
    .signal-tag.bear { background:rgba(248,81,73,.12); border-color:rgba(248,81,73,.4); color:var(--red); }
    .signal-tag.neutral { background:var(--bg3); border-color:var(--border); color:var(--muted); }
    .no-signal { font-size:13px; color:var(--muted); padding:4px 0; }

    /* ── Institutional ── */
    .inst-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; margin-bottom:16px; }
    .inst-card {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--radius); padding:14px;
    }
    .inst-card-title { font-size:12px; color:var(--muted); margin-bottom:6px; }
    .inst-card-net { font-size:18px; font-weight:700; }
    .inst-card-detail { font-size:11px; color:var(--muted); margin-top:4px; }
    #instChart { width:100%; height:200px; }

    /* ── Fundamental Panel ── */
    .fund-loading {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:12px; padding:60px 20px; color:var(--muted);
    }
    .fund-loading-spinner {
      width:28px; height:28px; border:3px solid var(--border);
      border-top-color:var(--blue); border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Revenue ── */
    #revenueChart { width:100%; height:220px; }
    .rev-summary { display:flex; gap:20px; margin-bottom:12px; flex-wrap:wrap; }
    .rev-item { font-size:13px; }
    .rev-item span { color:var(--muted); font-size:12px; }

    /* ── Financial Table ── */
    .fin-table-wrap { overflow-x:auto; margin-bottom:20px; }
    .fin-table {
      width:100%; border-collapse:collapse; font-size:13px; min-width:600px;
    }
    .fin-table th {
      background:var(--bg3); color:var(--muted); font-weight:500;
      padding:8px 12px; text-align:right; border-bottom:1px solid var(--border);
      white-space:nowrap;
    }
    .fin-table th:first-child { text-align:left; }
    .fin-table td {
      padding:8px 12px; text-align:right; border-bottom:1px solid var(--border);
      white-space:nowrap;
    }
    .fin-table td:first-child { text-align:left; color:var(--muted); }
    .fin-table tr:hover td { background:var(--bg3); }
    .fin-table .good { color:var(--green); }
    .fin-table .bad  { color:var(--red); }

    /* ── Valuation Cards ── */
    .val-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:24px; }
    .val-card {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--radius); padding:14px; text-align:center;
    }
    .val-card-label { font-size:11px; color:var(--muted); margin-bottom:6px; }
    .val-card-value { font-size:22px; font-weight:700; }
    .val-card-sub   { font-size:11px; color:var(--muted); margin-top:4px; }

    /* ── Loading / Error ── */
    #mainMsg { text-align:center; padding:60px 20px; color:var(--muted); font-size:15px; display:none; }
    .placeholder { color:var(--muted); font-size:13px; padding:20px 0; }

    @media(max-width:600px){
      .header-right { display:none; }
      #klineChart { height:260px; }
    }
  </style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <a href="/">← 台股分析系統</a>
  <a href="/sectors.html">🗂 產業分類</a>
  <div class="search-wrap">
    <input id="stockInput" type="text" placeholder="股票代號" value="2330" maxlength="6">
    <button class="btn" onclick="loadStock()">查詢</button>
    <button class="btn" id="syncBtn" onclick="syncAll()">↻ 更新</button>
  </div>
</div>
<div id="syncStatus"></div>

<!-- Stock Header -->
<div class="stock-header">
  <div class="header-left">
    <div class="header-title">
      <span id="stockName">—</span>
      <span id="stockCode" style="color:var(--muted);font-size:15px"></span>
    </div>
    <div class="tags" id="stockTags"></div>
    <div class="price-row">
      <span id="closePrice">—</span>
      <span id="changeBadge"></span>
      <span id="ohlcRow"></span>
    </div>
  </div>
  <div class="header-right">
    <div class="score-group" id="scoreGroup"></div>
  </div>
</div>

<!-- Tab Nav -->
<div class="tab-nav">
  <button class="tab-btn active" data-tab="technical" onclick="switchTab('technical')">技術分析</button>
  <div class="tab-divider"></div>
  <button class="tab-btn" data-tab="fundamental" onclick="switchTab('fundamental')">基本面</button>
</div>

<!-- ════════════════════════════════════
     技術分析 Panel
════════════════════════════════════ -->
<div id="panel-technical">

  <!-- Chart Controls -->
  <div class="chart-controls">
    <div class="period-bar">
      <button class="btn" data-months="1" onclick="setPeriod(this)">1M</button>
      <button class="btn active" data-months="2" onclick="setPeriod(this)">2M</button>
      <button class="btn" data-months="3" onclick="setPeriod(this)">3M</button>
      <button class="btn" data-months="6" onclick="setPeriod(this)">6M</button>
    </div>
    <button class="btn" id="fibBtn" onclick="toggleFib(this)" title="斐波那契回撤線">Fib</button>
    <div class="legend-bar">
      <span><span class="ldot" style="background:#e3b341"></span>MA5</span>
      <span><span class="ldot" style="background:#f0a070"></span>MA10</span>
      <span><span class="ldot" style="background:#58a6ff"></span>MA20</span>
      <span><span class="ldot" style="background:#bc8cff"></span>MA60</span>
      <span style="color:var(--border)">|</span>
      <span><span class="ldot" style="background:#e3b341"></span>VMA5</span>
      <span><span class="ldot" style="background:#58a6ff"></span>VMA20</span>
    </div>
  </div>

  <!-- Charts + Sidebar -->
  <div id="mainMsg">載入中...</div>
  <div class="page-body">
    <!-- 左：圖表單欄 -->
    <div class="charts-col" id="chartBlock">
      <div class="kline-wrap">
        <button id="crossBtn" class="cross-toggle-btn" onclick="toggleCrossSignals(this)" title="MA5/MA20 金叉死叉">金叉/死叉</button>
        <div id="klineChart"></div>
      </div>
      <div id="volumeChart"></div>
      <div id="rsiChart"></div>
      <div id="kdChart"></div>
      <div id="macdChart"></div>
    </div>

    <!-- 右：Sticky Sidebar -->
    <div class="sidebar">
      <!-- 指標摘要 -->
      <div class="sb-section">
        <div class="sb-title">指標摘要</div>
        <div id="sbIndicators"><span style="color:var(--muted);font-size:12px">載入中...</span></div>
      </div>
      <!-- 交易訊號 -->
      <div class="sb-section">
        <div class="sb-title">交易訊號</div>
        <div class="sb-sig-list" id="sbSignals"><span style="color:var(--muted);font-size:12px">載入中...</span></div>
      </div>
      <!-- AI 分析 -->
      <div class="sb-section">
        <div class="sb-title" style="display:flex;align-items:center;justify-content:space-between">
          <span>AI 分析</span>
          <button class="btn" id="aiAnalyzeBtn" onclick="runAIAnalysis()" style="font-size:11px;padding:3px 10px;border-radius:5px">▶ 分析</button>
        </div>
        <div class="sb-ai" id="sbAI" style="font-size:12px;line-height:1.6;color:var(--text);white-space:pre-wrap;min-height:60px">
          <span style="color:var(--muted)">點擊「分析」讓 AI 解讀目前指標與籌碼</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Technical Indicators (detail) -->
  <div class="section">
    <div class="section-title">技術指標</div>
    <div class="cards-grid" id="indicatorCards">
      <div class="placeholder">載入中...</div>
    </div>
  </div>

  <!-- Signals (detail) -->
  <div class="section">
    <div class="section-title">交易訊號</div>
    <div class="signals-wrap" id="signalsWrap">
      <span class="no-signal">載入中...</span>
    </div>
  </div>

  <!-- Institutional -->
  <div class="section">
    <div class="section-title">三大法人（近20日）</div>
    <div class="inst-cards" id="instCards">
      <div class="placeholder">載入中...</div>
    </div>
    <div class="chart-block" style="padding:0;margin-bottom:20px">
      <div id="instChart"></div>
    </div>
  </div>

  <div style="height:40px"></div>
</div>

<!-- ════════════════════════════════════
     基本面 Panel（lazy load）
════════════════════════════════════ -->
<div id="panel-fundamental" style="display:none">

  <!-- Valuation -->
  <div class="section">
    <div class="section-title">估值指標</div>
    <div class="val-cards" id="valCards">
      <div class="placeholder">—</div>
    </div>
  </div>

  <!-- Revenue -->
  <div class="section">
    <div class="section-title">月營收</div>
    <div class="rev-summary" id="revSummary"></div>
    <div class="chart-block" style="padding:0;margin-bottom:20px">
      <div id="revenueChart"></div>
    </div>
  </div>

  <!-- Financial -->
  <div class="section">
    <div class="section-title">財報摘要（近四季）</div>
    <div class="fin-table-wrap" id="finTableWrap">
      <div class="placeholder">—</div>
    </div>
  </div>

  <div style="height:40px"></div>
</div>

<script>
/* ══════════════════════════════
   State
══════════════════════════════ */
let currentMonths = 2;
let currentStockId = new URLSearchParams(location.search).get('id') || '2330';
let fundamentalLoaded = false;
let revChart = null;
let fibEnabled = false;
let currentKlineData = null;
let showCrossSignals = false;

// 以當月為基準，往前推 N 個月，回傳當月第一天（用本地時間避免時區偏移）
function getStartDate(months) {
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth() - (months - 1), 1);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  return `${y}-${m}-01`;
}

document.getElementById('stockInput').value = currentStockId;

/* ══════════════════════════════
   ECharts init（技術分析用）
══════════════════════════════ */
const klineChart  = echarts.init(document.getElementById('klineChart'),  'dark');
const volumeChart = echarts.init(document.getElementById('volumeChart'), 'dark');
const rsiChart    = echarts.init(document.getElementById('rsiChart'),    'dark');
const kdChart     = echarts.init(document.getElementById('kdChart'),     'dark');
const macdChart   = echarts.init(document.getElementById('macdChart'),   'dark');
const instChart   = echarts.init(document.getElementById('instChart'),   'dark');

echarts.connect([klineChart, volumeChart, rsiChart, kdChart, macdChart]);

window.addEventListener('resize', () => {
  [klineChart, volumeChart, rsiChart, kdChart, macdChart, instChart].forEach(c => c.resize());
  if (revChart) revChart.resize();
});

/* ══════════════════════════════
   Helpers
══════════════════════════════ */
const fmt  = (n,d=2) => n==null ? '—' : Number(n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtB = n => { if(n==null) return '—'; const a=Math.abs(n); return (n<0?'-':'+')+( a>=1e8?(a/1e8).toFixed(2)+'億' : a>=1e4?(a/1e4).toFixed(0)+'萬' : a.toLocaleString() ); };
const fmtM = n => n==null?'—': (Math.abs(n)>=1e8?(n/1e8).toFixed(2)+'億': Math.abs(n)>=1e4?(n/1e4).toFixed(0)+'萬': Number(n).toLocaleString());
const scoreColor = s => s==null?'var(--muted)': s>=70?'var(--green)': s>=50?'var(--yellow)': 'var(--red)';

function calcVMA(vol, n) {
  return vol.map((_,i)=>{ if(i<n-1)return null; const s=vol.slice(i-n+1,i+1).reduce((a,b)=>a+(b||0),0); return Math.round(s/n); });
}

const DARK_OPTS = { backgroundColor:'#0d1117' };

/* ══════════════════════════════
   Tab 切換
══════════════════════════════ */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');

  const istech = tab === 'technical';
  document.getElementById('panel-technical').style.display  = istech ? '' : 'none';
  document.getElementById('panel-fundamental').style.display = istech ? 'none' : '';

  if (istech) {
    // resize charts back after visibility restore
    setTimeout(() => [klineChart,volumeChart,rsiChart,kdChart,macdChart,instChart].forEach(c=>c.resize()), 50);
  } else {
    // 第一次點擊才抓基本面資料
    if (!fundamentalLoaded) {
      fundamentalLoaded = true;
      loadFundamentals();
    } else if (revChart) {
      setTimeout(() => revChart.resize(), 50);
    }
  }
}

   Period / Search
══════════════════════════════ */
function setPeriod(btn) {
  document.querySelectorAll('.period-bar .btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentMonths = parseInt(btn.dataset.months);
  loadCharts();
}

function loadStock() {
  const v = document.getElementById('stockInput').value.trim();
  if (!v) return;
  currentStockId = v;
  fundamentalLoaded = false;
  currentMonths = 2; // 切換股票重置為預設期間
  showCrossSignals = false;
  document.getElementById('crossBtn')?.classList.remove('active');
  document.querySelectorAll('.period-bar .btn').forEach((b,i)=>b.classList.toggle('active', i===1));
  history.replaceState(null,'',`?id=${v}`);
  // 回到技術分析 tab
  switchTab('technical');
  loadAll();
}

document.getElementById('stockInput').addEventListener('keydown', e => { if(e.key==='Enter') loadStock(); });

/* ══════════════════════════════
   Main Load（技術分析）
══════════════════════════════ */
async function loadAll() {
  showMsg('載入中...');
  try {
    const startDate = getStartDate(currentMonths);
    const [infoRes, klineRes, indRes] = await Promise.all([
      fetch(`/api/stocks/${currentStockId}`),
      fetch(`/api/stocks/${currentStockId}/kline?startDate=${startDate}`),
      fetch(`/api/stocks/${currentStockId}/indicators?startDate=${startDate}`)
    ]);
    const info  = await infoRes.json();
    const kline = await klineRes.json();
    const ind   = await indRes.json();

    if (!kline.success) { showMsg('查無資料：' + currentStockId); return; }
    hideMsg();

    renderHeader(info.data, kline.data);
    renderCharts(kline.data, ind.data);

    loadLatest();
    loadSignals();
    loadScore();
    loadInstitutional();
  } catch(e) { showMsg('載入失敗：' + e.message); }
}

async function loadCharts() {
  try {
    const startDate = getStartDate(currentMonths);
    const [klineRes, indRes] = await Promise.all([
      fetch(`/api/stocks/${currentStockId}/kline?startDate=${startDate}`),
      fetch(`/api/stocks/${currentStockId}/indicators?startDate=${startDate}`)
    ]);
    const kline = await klineRes.json();
    const ind   = await indRes.json();
    if (kline.success) renderCharts(kline.data, ind.data);
  } catch(e) {}
}

/* ══════════════════════════════
   Header
══════════════════════════════ */
function renderHeader(info, kline) {
  const ohlcv = kline.ohlcv.map(r=>r.map(v=>v!=null?parseFloat(v):null));
  const last  = ohlcv[ohlcv.length-1]; // [open,close,low,high]
  const close = last[1];
  const chgPct = parseFloat(kline.change_percent[kline.change_percent.length-1]);
  const isUp = chgPct >= 0;

  document.getElementById('stockName').textContent = info ? info.stock_name : currentStockId;
  document.getElementById('stockCode').textContent = currentStockId;
  document.getElementById('closePrice').textContent = fmt(close);
  document.getElementById('closePrice').className = isUp ? 'up' : 'down';

  const badge = document.getElementById('changeBadge');
  badge.textContent = isNaN(chgPct) ? '' : `${isUp?'+':''}${chgPct.toFixed(2)}%`;
  badge.className = 'changeBadge ' + (isUp ? 'up-bg' : 'down-bg');

  document.getElementById('ohlcRow').textContent =
    `開 ${fmt(last[0])}　高 ${fmt(last[3])}　低 ${fmt(last[2])}`;

  const tags = document.getElementById('stockTags');
  tags.innerHTML = '';
  if (info) {
    if (info.market_type) tags.innerHTML += `<span class="tag">${info.market_type}</span>`;
    if (info.industry)    tags.innerHTML += `<span class="tag">${info.industry}</span>`;
  }
  document.title = `${info?.stock_name||currentStockId} ${currentStockId} - 台股分析`;
}

/* ══════════════════════════════
   Charts
══════════════════════════════ */
function buildCrossMarkPoints(dates, ohlcv, signals) {
  return (signals || []).map(s=>{
    const idx = dates.indexOf(s.date); if(idx===-1)return null;
    const [o,c,low,high]=ohlcv[idx]; const isG=s.type==='golden_cross';
    return { coord:[idx,isG?low:high], value:s.label, symbolOffset:[0,isG?'60%':'-60%'],
      symbol:'arrow', symbolRotate:isG?0:180, symbolSize:14,
      itemStyle:{color:isG?'#3fb950':'#f85149'},
      label:{show:true,formatter:s.label,fontSize:10,color:'#fff',offset:isG?[0,14]:[0,-14]} };
  }).filter(Boolean);
}

function renderCharts(kline, ind) {
  const d = kline;
  d.ohlcv          = d.ohlcv.map(r=>r.map(v=>v!=null?parseFloat(v):null));
  d.volume         = d.volume.map(v=>v!=null?parseFloat(v):null);
  d.change_percent = d.change_percent.map(v=>v!=null?parseFloat(v):null);
  d.ma5  = d.ma5.map(v=>v!=null?parseFloat(v):null);
  d.ma10 = d.ma10.map(v=>v!=null?parseFloat(v):null);
  d.ma20 = d.ma20.map(v=>v!=null?parseFloat(v):null);
  d.ma60 = d.ma60.map(v=>v!=null?parseFloat(v):null);

  // 金叉/死叉預設隱藏；按鈕開啟後才顯示
  const markPoints = [];

  const dataZoomShared = [
    { type:'inside', xAxisIndex:[0], start:0, end:100 },
    { type:'slider',  xAxisIndex:[0], start:0, end:100, bottom:2, height:20,
      fillerColor:'rgba(31,111,235,.15)', borderColor:'#30363d', textStyle:{color:'#8b949e'} }
  ];
  const dataZoomLinked = [
    { type:'inside', xAxisIndex:[0], start:0, end:100 },
    { type:'slider',  xAxisIndex:[0], show:false }
  ];

  // --- K-line ---
  klineChart.setOption({ ...DARK_OPTS, animation:false,
    grid:{ left:60,right:16,top:16,bottom:48 },
    xAxis:{ type:'category', data:d.dates, axisLine:{lineStyle:{color:'#30363d'}},
      axisLabel:{color:'#8b949e',fontSize:11,formatter:v=>v.slice(5)}, splitLine:{show:false} },
    yAxis:{ scale:true, axisLine:{lineStyle:{color:'#30363d'}},
      axisLabel:{color:'#8b949e',fontSize:11}, splitLine:{lineStyle:{color:'#21262d'}} },
    tooltip:{ trigger:'axis', axisPointer:{type:'cross',crossStyle:{color:'#555'}},
      backgroundColor:'#161b22', borderColor:'#30363d', textStyle:{color:'#e6edf3',fontSize:12},
      formatter:params=>{
        const c=params.find(p=>p.seriesName==='K線'); if(!c)return '';
        const [o,cl,l,h]=c.value; const color=cl>=o?'#f85149':'#3fb950';
        let html=`<div style="margin-bottom:4px;color:#8b949e">${c.axisValue}</div>`;
        html+=`<div>開<b style="color:${color};margin-left:6px">${o}</b>　高<b style="color:${color}">${h}</b></div>`;
        html+=`<div>低<b style="color:${color};margin-left:6px">${l}</b>　收<b style="color:${color}">${cl}</b></div>`;
        params.filter(p=>p.seriesName!=='K線').forEach(p=>{
          if(p.value!=null) html+=`<div><span style="display:inline-block;width:10px;height:3px;background:${p.color};margin-right:4px;border-radius:2px"></span>${p.seriesName} <b>${p.value}</b></div>`;
        }); return html;
      }
    },
    dataZoom: dataZoomShared,
    series:[
      { name:'K線', type:'candlestick', data:d.ohlcv,
        itemStyle:{color:'#f85149',color0:'#3fb950',borderColor:'#f85149',borderColor0:'#3fb950'},
        markPoint:{data:markPoints,animation:false} },
      maL('MA5',d.ma5,'#e3b341'), maL('MA10',d.ma10,'#f0a070'), maL('MA20',d.ma20,'#58a6ff'), maL('MA60',d.ma60,'#bc8cff')
    ]
  }, true);

  // --- Volume ---
  const colors = d.ohlcv.map(([o,c])=>c>=o?'#f85149':'#3fb950');
  volumeChart.setOption({ ...DARK_OPTS, animation:false,
    grid:{left:60,right:16,top:4,bottom:6},
    xAxis:{type:'category',data:d.dates,axisLabel:{show:false},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{show:false}},
    yAxis:{axisLabel:{color:'#8b949e',fontSize:10,formatter:v=>v>=1e8?(v/1e8).toFixed(0)+'億':v>=1e4?(v/1e4).toFixed(0)+'萬':v},
      axisLine:{lineStyle:{color:'#30363d'}}, splitLine:{lineStyle:{color:'#21262d'}}},
    tooltip:{trigger:'axis',backgroundColor:'#161b22',borderColor:'#30363d',textStyle:{color:'#e6edf3',fontSize:12},
      formatter:p=>{const b=p[0]; return `${b.axisValue}<br/>成交量 <b>${Number(b.value).toLocaleString()}</b>`;}},
    dataZoom: dataZoomLinked,
    series:[
      {type:'bar',data:d.volume,itemStyle:{color:p=>colors[p.dataIndex]+'99'}},
      {name:'VMA5',type:'line',data:calcVMA(d.volume,5),symbol:'none',lineStyle:{color:'#e3b341',width:1.2},connectNulls:false},
      {name:'VMA20',type:'line',data:calcVMA(d.volume,20),symbol:'none',lineStyle:{color:'#58a6ff',width:1.2},connectNulls:false},
    ]
  }, true);

  // --- RSI ---
  const indDates = ind?.dates || [];
  const rsiData  = alignSeries(d.dates, indDates, ind?.rsi || []);
  rsiChart.setOption({ ...DARK_OPTS, animation:false,
    grid:{left:60,right:16,top:4,bottom:6},
    xAxis:{type:'category',data:d.dates,axisLabel:{show:false},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{show:false}},
    yAxis:{min:0,max:100,splitNumber:2,axisLabel:{color:'#8b949e',fontSize:10},axisLine:{lineStyle:{color:'#30363d'}},
      splitLine:{lineStyle:{color:'#21262d'}}},
    tooltip:{trigger:'axis',backgroundColor:'#161b22',borderColor:'#30363d',textStyle:{color:'#e6edf3',fontSize:12},
      formatter:p=>{const v=p[0]?.value; return `${p[0].axisValue}<br/>RSI <b style="color:${v>=70?'#f85149':v<=30?'#3fb950':'#e6edf3'}">${v!=null?v.toFixed(1):'—'}</b>`;} },
    markLine:{ silent:true, symbol:'none', lineStyle:{color:'#30363d',type:'dashed'},
      data:[{yAxis:70,label:{formatter:'超買',color:'#f85149',fontSize:10}},{yAxis:30,label:{formatter:'超賣',color:'#3fb950',fontSize:10}}] },
    dataZoom: dataZoomLinked,
    series:[{ name:'RSI', type:'line', data:rsiData, symbol:'none',
      lineStyle:{color:'#e3b341',width:1.5},
      itemStyle:{color:p=>p.value>=70?'#f85149':p.value<=30?'#3fb950':'#e3b341'},
      markLine:{silent:true,symbol:'none',lineStyle:{type:'dashed',color:'#30363d'},
        data:[{yAxis:70},{yAxis:30}]}, connectNulls:false
    }]
  }, true);

  // --- KD ---
  const kdKData = alignSeries(d.dates, indDates, ind?.kd_k || []);
  const kdDData = alignSeries(d.dates, indDates, ind?.kd_d || []);
  kdChart.setOption({ ...DARK_OPTS, animation:false,
    grid:{left:60,right:16,top:22,bottom:6},
    xAxis:{type:'category',data:d.dates,axisLabel:{show:false},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{show:false}},
    yAxis:{min:0,max:100,splitNumber:2,axisLabel:{color:'#8b949e',fontSize:10},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{lineStyle:{color:'#21262d'}}},
    tooltip:{trigger:'axis',backgroundColor:'#161b22',borderColor:'#30363d',textStyle:{color:'#e6edf3',fontSize:12},
      formatter:p=>`${p[0].axisValue}<br/>K <b>${p[0]?.value?.toFixed(1)||'—'}</b>　D <b>${p[1]?.value?.toFixed(1)||'—'}</b>`},
    dataZoom: dataZoomLinked,
    legend:{data:['K值','D值'],textStyle:{color:'#8b949e',fontSize:11},top:2,right:16},
    series:[
      {name:'K值',type:'line',data:kdKData,symbol:'none',lineStyle:{color:'#f0a070',width:1.5},connectNulls:false},
      {name:'D值',type:'line',data:kdDData,symbol:'none',lineStyle:{color:'#bc8cff',width:1.5},connectNulls:false},
      {type:'line',data:[{xAxis:0,yAxis:80},{xAxis:0,yAxis:20}],silent:true},
    ]
  }, true);

  // --- MACD ---
  const macdData = alignSeries(d.dates, indDates, ind?.macd || []);
  const sigData  = alignSeries(d.dates, indDates, ind?.macd_signal || []);
  const histData = alignSeries(d.dates, indDates, ind?.macd_histogram || []);

  const histNonNull = histData.filter(v => v != null);
  const histMax = histNonNull.length ? Math.max(...histNonNull.map(Math.abs)) * 1.1 : 1;

  macdChart.setOption({ ...DARK_OPTS, animation:false,
    grid:{left:60,right:16,top:22,bottom:28},
    xAxis:{type:'category',data:d.dates,axisLine:{lineStyle:{color:'#30363d'}},
      axisLabel:{color:'#8b949e',fontSize:11,formatter:v=>v.slice(5)},splitLine:{show:false}},
    yAxis:[
      { min:-histMax, max:histMax, show:false },
      { scale:true, axisLabel:{color:'#8b949e',fontSize:10}, axisLine:{lineStyle:{color:'#30363d'}}, splitLine:{lineStyle:{color:'#21262d'}} }
    ],
    tooltip:{trigger:'axis',backgroundColor:'#161b22',borderColor:'#30363d',textStyle:{color:'#e6edf3',fontSize:12},
      formatter:p=>`${p[0].axisValue}<br/>MACD <b>${p.find(x=>x.seriesName==='MACD')?.value?.toFixed(2)||'—'}</b>　Signal <b>${p.find(x=>x.seriesName==='Signal')?.value?.toFixed(2)||'—'}</b>　Hist <b style="color:${(p.find(x=>x.seriesName==='Histogram')?.value??0)>=0?'#3fb950':'#f85149'}">${p.find(x=>x.seriesName==='Histogram')?.value?.toFixed(2)||'—'}</b>`},
    dataZoom: dataZoomLinked,
    legend:{data:['MACD','Signal','Histogram'],textStyle:{color:'#8b949e',fontSize:11},top:2,right:16},
    series:[
      { name:'Histogram', type:'bar', data:histData, yAxisIndex:0,
        itemStyle:{color:p=>p.value>=0?'rgba(63,185,80,.85)':'rgba(248,81,73,.85)'},
        barMaxWidth:8 },
      { name:'MACD',   type:'line', data:macdData, yAxisIndex:1, symbol:'none', lineStyle:{color:'#58a6ff',width:1.5}, connectNulls:false },
      { name:'Signal', type:'line', data:sigData,  yAxisIndex:1, symbol:'none', lineStyle:{color:'#f0a070',width:1.5}, connectNulls:false },
    ]
  }, true);

  // 存起來讓 Fib 可以用，並在 period 切換後重套
  currentKlineData = d;
  if (fibEnabled) updateFibLines();

  // 更新 sidebar 指標摘要
  updateSidebarIndicators(ind);
}

function updateSidebarIndicators(ind) {
  const last = arr => arr ? [...arr].reverse().find(v => v != null) : null;
  const rsi  = last(ind?.rsi);
  const k    = last(ind?.kd_k);
  const d    = last(ind?.kd_d);
  const macd = last(ind?.macd);
  const hist = last(ind?.macd_histogram);

  const rsiColor = rsi >= 70 ? 'var(--red)' : rsi <= 30 ? 'var(--green)' : 'var(--text)';
  const rsiLbl   = rsi >= 70 ? '超買' : rsi <= 30 ? '超賣' : '中性';
  const histColor = hist >= 0 ? 'var(--green)' : 'var(--red)';
  const kdColor  = k > d ? 'var(--orange)' : 'var(--purple)';
  const kdLbl    = k > d ? 'K > D（偏多）' : 'K < D（偏空）';

  document.getElementById('sbIndicators').innerHTML = `
    <div class="sb-row">
      <span class="sb-label">RSI(14)</span>
      <span class="sb-val" style="color:${rsiColor}">${rsi != null ? rsi.toFixed(1) : '—'}</span>
    </div>
    <div style="font-size:10px;color:${rsiColor};margin:-2px 0 3px">${rsiLbl}</div>
    <div class="sb-bar"><div class="sb-bar-fill" style="width:${Math.min(rsi??0,100)}%;background:${rsiColor}"></div></div>

    <div class="sb-row">
      <span class="sb-label">K</span>
      <span class="sb-val" style="color:var(--orange)">${k != null ? k.toFixed(1) : '—'}</span>
    </div>
    <div class="sb-row" style="margin-bottom:3px">
      <span class="sb-label">D</span>
      <span class="sb-val" style="color:var(--purple)">${d != null ? d.toFixed(1) : '—'}</span>
    </div>
    <div style="font-size:10px;color:${kdColor};margin-bottom:8px">${kdLbl}</div>

    <div class="sb-row">
      <span class="sb-label">MACD</span>
      <span class="sb-val" style="color:var(--blue)">${macd != null ? macd.toFixed(2) : '—'}</span>
    </div>
    <div class="sb-row">
      <span class="sb-label">Histogram</span>
      <span class="sb-val" style="color:${histColor}">${hist != null ? (hist >= 0 ? '+' : '') + hist.toFixed(2) : '—'}</span>
    </div>`;
}

function alignSeries(targetDates, srcDates, srcVals) {
  const map = {};
  srcDates.forEach((d,i)=>{ map[d]=srcVals[i]; });
  return targetDates.map(d=>map[d]!=null?map[d]:null);
}

function maL(name,data,color) {
  return { name, type:'line', data, smooth:false, symbol:'none',
    lineStyle:{color,width:1.5}, connectNulls:false };
}

/* ══════════════════════════════
   Fibonacci Retracement
══════════════════════════════ */
const FIB_RATIOS = [
  { r: 1,     color: '#8b949e', label: '100%', solid: false },
  { r: 0.786, color: '#bc8cff', label: '78.6%', solid: false },
  { r: 0.618, color: '#e3b341', label: '61.8%', solid: true  },  // 黃金比例
  { r: 0.5,   color: '#8b949e', label: '50.0%', solid: false },
  { r: 0.382, color: '#3fb950', label: '38.2%', solid: false },
  { r: 0.236, color: '#58a6ff', label: '23.6%', solid: false },
  { r: 0,     color: '#8b949e', label: '0%',    solid: false },
];

function toggleCrossSignals(btn) {
  showCrossSignals = !showCrossSignals;
  btn.classList.toggle('active', showCrossSignals);
  if (!currentKlineData) return;
  const pts = showCrossSignals
    ? buildCrossMarkPoints(currentKlineData.dates, currentKlineData.ohlcv, currentKlineData.signals)
    : [];
  klineChart.setOption({ series: [{ markPoint: { data: pts } }] }, false);
}

function toggleFib(btn) {
  fibEnabled = !fibEnabled;
  btn.classList.toggle('active', fibEnabled);
  updateFibLines();
}

function updateFibLines() {
  if (!currentKlineData) return;

  if (!fibEnabled) {
    klineChart.setOption({ series: [{ markLine: { data: [] } }] }, false);
    return;
  }

  // ohlcv 格式：[open, close, low, high]
  const highs = currentKlineData.ohlcv.map(r => r[3]);
  const lows  = currentKlineData.ohlcv.map(r => r[2]);
  const high  = Math.max(...highs);
  const low   = Math.min(...lows);
  const diff  = high - low;

  klineChart.setOption({
    series: [{
      markLine: {
        silent: true, symbol: 'none', animation: false,
        data: FIB_RATIOS.map(f => {
          const price = low + diff * f.r;
          return {
            yAxis: price,
            lineStyle: {
              color: f.color,
              type: f.solid ? 'solid' : 'dashed',
              width: f.solid ? 1.5 : 1,
              opacity: 0.75,
            },
            label: {
              formatter: `${f.label}  ${price.toFixed(1)}`,
              position: 'insideEndTop',
              color: f.color,
              fontSize: 11,
              backgroundColor: 'rgba(13,17,23,0.75)',
              padding: [2, 5],
              borderRadius: 3,
            }
          };
        })
      }
    }]
  }, false); // false = merge，保留 markPoint 金叉死叉
}

/* ══════════════════════════════
   Latest / Indicator Cards
══════════════════════════════ */
async function loadLatest() {
  try {
    const r = await fetch(`/api/stocks/${currentStockId}/latest`);
    const j = await r.json();
    if (!j.success) return;
    const d = j.data;

    document.getElementById('ohlcRow').textContent =
      `開 ${fmt(d.open_price)}　高 ${fmt(d.high_price)}　低 ${fmt(d.low_price)}`;

    const rsi = parseFloat(d.rsi);
    const kdK = parseFloat(d.kd_k), kdD = parseFloat(d.kd_d);
    const macd = parseFloat(d.macd), hist = parseFloat(d.macd_histogram);
    const adx  = parseFloat(d.adx);
    const bUp  = parseFloat(d.bollinger_upper), bMid = parseFloat(d.bollinger_middle), bLow = parseFloat(d.bollinger_lower);
    const bPos = bUp && bLow ? ((parseFloat(d.close_price)-bLow)/(bUp-bLow)*100) : null;
    const wr   = parseFloat(d.williams_r);
    const atr  = parseFloat(d.atr);

    const cards = [
      { label:'RSI (14)', value:fmt(rsi,1), sub:rsi>=70?'超買區':rsi<=30?'超賣區':'中性',
        bar:rsi, barColor:rsi>=70?'var(--red)':rsi<=30?'var(--green)':'var(--yellow)',
        valClass:rsi>=70?'up':rsi<=30?'down':'' },
      { label:'KD', value:`K ${fmt(kdK,1)}`, sub:`D ${fmt(kdD,1)}`,
        bar:kdK, barColor:kdK>kdD?'var(--green)':'var(--red)', valClass:kdK>kdD?'down':'up' },
      { label:'MACD', value:fmt(macd,2), sub:`Histogram ${fmt(hist,2)}`,
        valClass:macd>0?'down':macd<0?'up':'' },
      { label:'布林通道位置', value:bPos!=null?fmt(bPos,1)+'%':'—',
        sub:`上 ${fmt(bUp)} / 中 ${fmt(bMid)} / 下 ${fmt(bLow)}`,
        bar:bPos, barColor:bPos>80?'var(--red)':bPos<20?'var(--green)':'var(--blue)' },
      { label:'ADX 趨勢強度', value:fmt(adx,1),
        sub:`+DI ${fmt(d.plus_di,1)}　-DI ${fmt(d.minus_di,1)}`,
        bar:adx, barMax:60, barColor:adx>=25?'var(--blue)':'var(--muted)',
        valClass:adx>=25?'':'flat' },
      { label:'Williams %R', value:fmt(wr,1),
        sub:wr>=-20?'超買':wr<=-80?'超賣':'中性',
        bar:(wr+100), barColor:wr>=-20?'var(--red)':wr<=-80?'var(--green)':'var(--yellow)',
        valClass:wr>=-20?'up':wr<=-80?'down':'' },
      { label:'ATR 波動度', value:fmt(atr,2), sub:'平均真實波動' },
      { label:'VWAP', value:fmt(d.vwap), sub:'量加權均價',
        valClass:parseFloat(d.close_price)>parseFloat(d.vwap)?'down':'up' },
    ];

    document.getElementById('indicatorCards').innerHTML = cards.map(c=>`
      <div class="icard">
        <div class="icard-label">${c.label}</div>
        <div class="icard-value ${c.valClass||''}">${c.value}</div>
        <div class="icard-sub">${c.sub||''}</div>
        ${c.bar!=null?`<div class="icard-bar"><div class="icard-bar-fill" style="width:${Math.min(c.bar/(c.barMax||100)*100,100).toFixed(1)}%;background:${c.barColor}"></div></div>`:''}
      </div>`).join('');
  } catch(e) {}
}

/* ══════════════════════════════
   AI Analysis
══════════════════════════════ */
async function runAIAnalysis() {
  const aiEl = document.getElementById('sbAI');
  const btn  = document.getElementById('aiAnalyzeBtn');
  if (!aiEl || !btn) return;

  // Gather current context from sidebar indicators
  const indEl = document.getElementById('sbIndicators');
  const sigEl = document.getElementById('sbSignals');
  const scoreEl = document.getElementById('scoreGroup');

  let contextLines = [];

  // Collect indicator values from sidebar text
  if (indEl) contextLines.push('【技術指標】\n' + (indEl.innerText || '').trim());
  if (sigEl) contextLines.push('【交易訊號】\n' + (sigEl.innerText || '').trim());
  if (scoreEl) contextLines.push('【評分】\n' + (scoreEl.innerText || '').trim());

  // Also grab inst cards if present
  const instEl = document.getElementById('instCards');
  if (instEl) contextLines.push('【法人籌碼（近20日）】\n' + (instEl.innerText || '').trim());

  const context = contextLines.join('\n\n');
  const stockName = document.getElementById('stockName')?.textContent || '';

  // UI: loading state
  btn.disabled = true;
  btn.textContent = '分析中…';
  aiEl.textContent = '';

  // Use marked.js if available, else fallback to plain text
  const renderMd = typeof marked !== 'undefined' ? (s => marked.parse(s)) : (s => s.replace(/</g,'&lt;'));

  try {
    const res = await fetch('/api/ai/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stockId: currentStockId, stockName, context }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      aiEl.textContent = '❌ ' + (err.error || res.statusText);
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const payload = JSON.parse(line.slice(6));
          if (payload.error) { aiEl.textContent = '❌ ' + payload.error; return; }
          if (payload.done) break;
          if (payload.text) {
            fullText += payload.text;
            // Render markdown progressively
            aiEl.innerHTML = renderMd(fullText);
            aiEl.scrollTop = aiEl.scrollHeight;
          }
        } catch(_) {}
      }
    }

    // Final render
    if (fullText) aiEl.innerHTML = renderMd(fullText);
    else if (!aiEl.textContent) aiEl.textContent = '（無回應）';
  } catch(e) {
    aiEl.textContent = '❌ ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ 重新分析';
  }
}

            params.forEach(p=>{ html+=`<div>${p.marker}${p.seriesName} <b style="color:${p.value>=0?'#3fb950':'#f85149'}">${fmtB(p.value)}</b></div>`; });

async function loadFundamentals() {
  // 初始化 revChart（第一次才建立）

  }

    loadRevenue(),
    loadFinancial(),

}

async function loadRevenue() {
  try {
    const r = await fetch(`/api/stocks/${currentStockId}/revenue`);
    const j = await r.json();
    if (!j.success || !j.data) {
      revChart.setOption({...DARK_OPTS,graphic:[{type:'text',left:'center',top:'middle',style:{text:'無月營收資料',fill:'#8b949e',fontSize:14}}]},true);
      return;
    }
    const d = j.data;
    const summary = document.getElementById('revSummary');
    summary.innerHTML = `
      <div class="rev-item">最新月份 <span>${d.latest_month||'—'}</span></div>
      <div class="rev-item">月營收 <b>${fmtM(d.latest_revenue)}</b></div>
      <div class="rev-item">月增率 <b class="${parseFloat(d.latest_mom)>=0?'down':'up'}">${d.latest_mom!=null?(parseFloat(d.latest_mom)>=0?'+':'')+parseFloat(d.latest_mom).toFixed(1)+'%':'—'}</b></div>
      <div class="rev-item">年增率 <b class="${parseFloat(d.latest_yoy)>=0?'down':'up'}">${d.latest_yoy!=null?(parseFloat(d.latest_yoy)>=0?'+':'')+parseFloat(d.latest_yoy).toFixed(1)+'%':'—'}</b></div>
    `;

    const hist = d.history || [];
    if (hist.length === 0) {
      revChart.setOption({...DARK_OPTS,graphic:[{type:'text',left:'center',top:'middle',style:{text:'無歷史營收資料',fill:'#8b949e',fontSize:14}}]},true);
      return;
    }

    const labels  = hist.map(h=>`${h.year}/${String(h.month).padStart(2,'0')}`);
    const revVals = hist.map(h=>parseFloat(h.revenue)||0);
    const yoyVals = hist.map(h=>h.revenue_yoy!=null?parseFloat(h.revenue_yoy):null);

    revChart.setOption({ ...DARK_OPTS, animation:false,
      grid:{left:70,right:60,top:20,bottom:40},
      xAxis:{type:'category',data:labels,axisLabel:{color:'#8b949e',fontSize:10,rotate:30},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{show:false}},
      yAxis:[
        {axisLabel:{color:'#8b949e',fontSize:10,formatter:v=>v>=1e8?(v/1e8).toFixed(1)+'億':v>=1e4?(v/1e4).toFixed(0)+'萬':v},
          axisLine:{lineStyle:{color:'#30363d'}},splitLine:{lineStyle:{color:'#21262d'}}},
        {axisLabel:{color:'#8b949e',fontSize:10,formatter:v=>v+'%'},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{show:false}},
      ],
      tooltip:{trigger:'axis',backgroundColor:'#161b22',borderColor:'#30363d',textStyle:{color:'#e6edf3',fontSize:12},
        formatter:params=>{
          let html=`<div style="color:#8b949e;margin-bottom:4px">${params[0].axisValue}</div>`;
          params.forEach(p=>{
            if(p.seriesName==='月營收') html+=`<div>${p.marker}月營收 <b>${fmtM(p.value)}</b></div>`;
            else if(p.value!=null) html+=`<div>${p.marker}年增率 <b style="color:${p.value>=0?'#3fb950':'#f85149'}">${(p.value>=0?'+':'')+p.value.toFixed(1)}%</b></div>`;
          }); return html;
        }},
      legend:{data:['月營收','年增率(%)'],textStyle:{color:'#8b949e',fontSize:11},top:0,right:8},
      series:[
        {name:'月營收',type:'bar',data:revVals,yAxisIndex:0,itemStyle:{color:'rgba(88,166,255,.7)'},barMaxWidth:32},
        {name:'年增率(%)',type:'line',data:yoyVals,yAxisIndex:1,symbol:'circle',symbolSize:5,
          lineStyle:{color:'#e3b341',width:2},itemStyle:{color:p=>p.value>=0?'#3fb950':'#f85149'},connectNulls:false},
      ]
    }, true);
  } catch(e) { document.getElementById('revSummary').textContent='載入失敗'; }
}

async function loadFinancial() {
  const wrap = document.getElementById('finTableWrap');
  try {
    const r = await fetch(`/api/stocks/${currentStockId}/financial`);
    const j = await r.json();
    const stmts = j.data?.financial_statements || [];
    if (stmts.length === 0) { wrap.innerHTML='<div class="placeholder">無財報資料（需先同步財報）</div>'; return; }

    const pct = (a,b) => a&&b&&b!==0 ? (a/b*100).toFixed(1)+'%' : '—';
    const rows = stmts.slice(-4).reverse().map(s=>{
      const grossM = pct(s.gross_profit, s.revenue);
      const opM    = pct(s.operating_income, s.revenue);
      const netM   = pct(s.net_income, s.revenue);
      const gVal = parseFloat(grossM), oVal = parseFloat(opM), nVal = parseFloat(netM);
      return `<tr>
        <td>${s.year} Q${s.quarter}</td>
        <td>${fmtM(s.revenue)}</td>
        <td class="${gVal>=30?'good':gVal<15?'bad':''}">${grossM}</td>
        <td class="${oVal>=15?'good':oVal<5?'bad':''}">${opM}</td>
        <td class="${nVal>=10?'good':nVal<0?'bad':''}">${netM}</td>
        <td class="${parseFloat(s.eps)>0?'good':'bad'}">${s.eps!=null?fmt(s.eps):'—'}</td>
        <td>${fmtM(s.operating_cash_flow)}</td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `
      <table class="fin-table">
        <thead><tr>
          <th>季度</th><th>營收</th><th>毛利率</th><th>營益率</th><th>淨利率</th><th>EPS</th><th>營業現金流</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch(e) { wrap.innerHTML='<div class="placeholder">載入失敗</div>'; }
}

  try {
    const r = await fetch(`/api/stocks/${currentStockId}/valuation`);

      { label:'EPS (TTM)', val:d.eps_ttm!=null?fmt(d.eps_ttm,2):'—', sub:'近四季合計' },

/* ══════════════════════════════
   Sync
══════════════════════════════ */
async function syncAll() {
  const btn = document.getElementById('syncBtn');
  const st  = document.getElementById('syncStatus');
  btn.disabled=true; btn.textContent='↻ 更新中...';
  st.style.display='block'; st.style.color='var(--muted)';
  st.textContent='正在更新股價並重算技術指標...';
  try {
    const res = await fetch('/api/admin/sync', { method:'POST' });
    const d   = await res.json();
    if (d.success) { st.style.color='var(--green)'; st.textContent='✓ '+d.message; loadAll(); }
    else           { st.style.color='var(--red)';   st.textContent='✗ '+d.error; }
  } catch(e) { st.style.color='var(--red)'; st.textContent='✗ '+e.message; }
  finally { btn.disabled=false; btn.textContent='↻ 更新'; setTimeout(()=>st.style.display='none',8000); }
}

function showMsg(m) { const el=document.getElementById('mainMsg'); el.textContent=m; el.style.display='block'; }
function hideMsg()  { document.getElementById('mainMsg').style.display='none'; }
